<!DOCTYPE html>
<html>
	<head>
		<title>Covid 19 Data Watch</title>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" 
			integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
	</head>
	<body>
		<div class="container">
			<div class="row">
				<div class="col-sm-8">
					<h2>Example Chart using Chart.js</h2>	
					<canvas id="myChart"></canvas>

					<h2>Example AJAX call to Covid19api</h2>
					<button type="button" onclick="loadContent()">Load Covid-19 Content</button>	
				</div>
				<div class="col-sm">
					<h2>Covid 19 Data</h2>	
					<p> This data has been collected and displayed from <a href="https://api.covid19api.com/summary">https://api.covid19api.com/summary</a> with the hope that it might be usefull for those interested.
					</p>
				</div>
			</div>
		</div>
		<!--local js-->
		<script src="./main.js"></script>

		<!-- ChartJS: https://www.chartjs.org/ -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.1.4/Chart.min.js"></script>

		<!-- Lodash: https://lodash.com/ -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.20/lodash.min.js"></script>

		<!-- Day.js: https://day.js.org/docs/en/installation/browser -->
		<script src="https://unpkg.com/dayjs@1.8.21/dayjs.min.js"></script>
		<script>
		  dayjs().format();
		  console.log(dayjs().format("YYYY-MM-DD"));

		</script>
	</body>
</html>
