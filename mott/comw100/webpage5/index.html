<!DOCTYPE html>
<html lang="en">
	<head>
		<script LANGUAGE="JavaScript" type="text/javascript">
		function display()
		{
			/*
				the end tags html were not included in the code in the assignment so I added them in here as 
				it seemed like a good idea
			*/ 
			DispWin = window.open('','NewWin','toolbar=no,status=no,width=300,height=200'); // also added this semi colon, although itseems to work ok without or without it in firefox
			message = "<ul><li><b>First Name: </b>" + document.test.firstname.value + "</li>";
			message += "<li><b>Last Name: </b>" + document.test.lastname.value + "</li>";
			message += "<li><b>E-Mail: </b>" + document.test.email.value + "</li>";
			message += "<li><b>Understanding Level: </b>"  + document.test.understanding.value + "</li>";
			message += "<li><b>Pass/Fail: </b>" + document.test.passfail.value + "</li>";
			message += "<li><b>Comments: </b>" + document.test.comments.value; + "</li></ul>"
			DispWin.document.write(message);	
		}
		</script>
		<meta charset="utf-8">
		<title>HTML Forms Test</title>
	</head>
	
	<body>
		<p>HTML Forms Test</p>
		<form name="test" method="post" action="index.html">
			<p>
				<label>First Name:</label>
				<input type="text" name="first" id="firstname">
			</p>
			<p>
				<label>Last Name:</label>
				<input type="text" name="last" id="lastname">
			</p>
			<p>
				<label>Email:</label>
				<input type="text" name="email" id="email">
			</p>
			<p>
				<label>How well do you understand HTML code? (1-10)</label>
				<input name="understanding" type="range" id="understanding" min=0 max=10 value=5>
			</p>	
			<p>How do you think that you'll do in this class?</p>
			<p>
				<input type="radio" name="passfail" value="pass" id="passfail_0"> <label for="passfail_0">Pass</label>
				<br>
				<input type="radio" name="passfail" value="fail" id="passfail_1"> <label for="passfail_1">Fail</label>	
				<br>
			</p>	
			
			<p>
				<label for="comments">Comments</label>
				<textarea name="comments" id="comments"></textarea>
			</p>
			<p>
				<input type="submit" name="submit" id="submit" value="submit" onClick="display();">	
			</p>
		</form>
	</body>
</html>
